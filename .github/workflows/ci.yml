name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Ruff check
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # core + demo + sim + perception を入れてテスト。
      # rclpy（ROS2）は pip に無いため ROS2 ノードのテストは自動 skip される（importorskip）。
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
