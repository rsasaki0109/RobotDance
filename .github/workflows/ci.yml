name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Ruff check
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # mediapipe は OpenGL 系の共有ライブラリ（libGLESv2 等）を要求するため事前に導入。
      - name: Install system libs (OpenGL for mediapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libegl1 libgles2
      # core + demo + sim + perception を入れてテスト。
      # rclpy（ROS2）は pip に無いため ROS2 ノードのテストは自動 skip される（importorskip）。
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
